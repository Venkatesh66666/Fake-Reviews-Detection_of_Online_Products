services:
  - type: web
    name: fake-reviews-detection
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m nltk.downloader -d nltk_data punkt punkt_tab stopwords averaged_perceptron_tagger averaged_perceptron_tagger_eng
    startCommand: gunicorn server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
